service: dnd_handbook
image: sas145work/dnd_handbook

servers:
  web:
    hosts:
      - dnd_handbook

proxy:
  ssl: true
  host: dndhandbook.ru

registry:
  username: sas145work
  # Always use an access token rather than real password when possible.
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - KAMAL_REGISTRY_PASSWORD
    - POSTGRES_PASSWORD
  clear:
    SOLID_QUEUE_IN_PUMA: true
    RAILS_LOG_TO_STDOUT: enabled
    RAILS_SERVE_STATIC_FILES: enabled
    POSTGRES_USER: dnd_handbook
    POSTGRES_DB: dnd_handbook_production
    DB_HOST: dnd_handbook-db
    DB_PORT: 5432
#    BOT_TOKEN: 7901258290:AAGofKmUY2hllwLDuIl0GiJNiwbmdPE3oYY # tmp - safe to commit
#    BOT_NAME: tmp_bot_remove_bot # tmp

# Aliases are triggered with "bin/kamal <alias>". You can overwrite arguments on invocation:
# "bin/kamal logs -r job" will tail logs from the first server in the job section.
aliases:
  console: app exec -i --reuse "bin/rails console"
  bash: app exec -i --reuse "bash"
  logs: app logs -f
  dbc: app exec -i --reuse "bin/rails dbconsole"
  dbb: accessory exec db -i --reuse "bash"
  backup-now: accessory exec backup "backup-now"
  backup-logs: accessory logs backup -f

# Use a persistent storage volume for sqlite database files and local Active Storage files.
# Recommended to change this to a mounted volume path that is backed up off server.
#volumes:
#  - "dnd_handbook_storage:/rails/storage"


# Bridge fingerprinted assets, like JS and CSS, between versions to avoid
# hitting 404 on in-flight requests. Combines all files from new and old
# version inside the asset_path.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64
  args:
    GIT_SHA: <%= %x(git rev-parse HEAD).strip %>

# Use a different ssh user than root
ssh:
  user: sneaky

accessories:
  db:
    image: postgres:17
    host: dnd_handbook
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: dnd_handbook
        POSTGRES_DB: dnd_handbook_production
      secret:
        - POSTGRES_PASSWORD
    files:
      - db/production.sql:/docker-entrypoint-initdb.d/setup.sql
    directories:
      - data:/var/lib/postgresql/data

  # New Relic host (OS) monitoring. Runs the infra agent as a container instead of
  # a native apt/systemd package so the agent travels with the Kamal config to any
  # host (boot it with `kamal accessory boot newrelic`). The -bundle image carries
  # nri-docker, so it also reports the other containers on the host via docker.sock.
  newrelic:
    image: newrelic/infrastructure-bundle:3.3.29
    host: dnd_handbook
    network: host
    env:
      clear:
        NRIA_DISPLAY_NAME: dnd_handbook
        NRIA_OVERRIDE_HOST_ROOT: /host
      secret:
        - NRIA_LICENSE_KEY
    volumes:
      - "/:/host:ro"
      - "/var/run/docker.sock:/var/run/docker.sock"
    options:
      privileged: true
      pid: host

  # Off-host PostgreSQL backups. Runs tiredofit/db-backup as a Kamal accessory (travels with the
  # config like the New Relic one — no host-side cron/rclone to redo per migration): nightly pg_dump
  # of the primary DB -> gzip -> Backblaze B2 (S3-compatible), 7-day retention. No `network:` key, so
  # it joins the default `kamal` network and reaches the DB by container name `dnd_handbook-db`.
  # A post-backup hook (.kamal/backup/notify.sh) posts a Discord embed every run and, if
  # BACKUP_HEALTHCHECK_URL is set, pings healthchecks.io as a dead-man's-switch.
  # Boot/replace on a host: bin/kamal accessory boot backup
  backup:
    image: tiredofit/db-backup:4.1.100   # >=4.1.99 bundles PG17 + PG18 clients (auto-selected)
    host: dnd_handbook
    files:
      - .kamal/backup/notify.sh:/assets/scripts/post/notify.sh
    env:
      clear:
        DB01_TYPE: pgsql
        DB01_HOST: dnd_handbook-db
        DB01_PORT: 5432
        DB01_NAME: dnd_handbook_production
        DB01_USER: dnd_handbook
        DB01_BACKUP_BEGIN: "0300"            # daily at 03:00
        DB01_BACKUP_INTERVAL: 1440           # minutes (24h)
        DB01_CLEANUP_TIME: 10080             # keep 7 days (minutes)
        DB01_COMPRESSION: GZ
        DB01_BACKUP_LOCATION: S3
        DB01_S3_BUCKET: dnd-handbook-backups          # set to your B2 bucket name
        DB01_S3_REGION: eu-central-003                   # middle segment of the B2 endpoint
        DB01_S3_HOST: s3.eu-central-003.backblazeb2.com  # the Endpoint shown on the B2 bucket
        DB01_S3_PATH: dnd_handbook
        DB01_POST_SCRIPT_SKIP_X_VERIFY: "TRUE"
      secret:
        - DB01_PASS
        - DB01_S3_KEY_ID
        - DB01_S3_KEY_SECRET
        - BACKUP_DISCORD_WEBHOOK
        - BACKUP_HEALTHCHECK_URL
